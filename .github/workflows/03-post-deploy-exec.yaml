# CI de Nível 03 - Disparo após a conclusão de outra pipeline

# nome da pipeline
name: 'N3 -Execução por Deploy'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule
# gatilho por conclusão de outra pipeline = workflow_run

on:
  workflow_run:
    workflows: ['N1 - Execução Manual', 'N2 - Execução Agendada']
    types:
      - completed

#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalção do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      #   instalação das dependências
      - name: Instalando dependências
        run: yarn install

      # executar os testes 
      - name: Executando testes em Mocha 
        run: yarn test

      #Gera o relatório do Mochawesome
      - name: Gerando relatório Mochawesome
        if: always()
        run: yarn test:report

      #Publica o relatório do Mochawesome como artefato do workflow  
      - name: Salvando relatório Mochawesome como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-mochawesome
          path: mochawesome-report
  
        