# CI de Nível 02 - Execução Agendada

# nome da pipeline
name: 'N2 - Execução Agendada'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch
# gatilho agendado = schedule

on:
  workflow_dispatch:

  schedule:
    # cronograma de execução
    # 1 - minuto, 2 - hora, 3 dia do mês, 4 - mês, 5 - dia da semana

    #Roda a cada 30 minutos
    - cron: '*/30 * * * *'

    #Roda toda sexta-feira à meia noite
    - cron: '0 0 * * 5'

#tarefas dentro da pipeline = jobs

jobs:
  #nome do job
  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalção do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      #   instalação das dependências
      - name: Instalando dependências
        run: yarn install

      # executar os testes 
      - name: Executando testes em Mocha 
        run: yarn test

      #Gera o relatório do Mochawesome
      - name: Gerando relatório Mochawesome
        if: always()
        run: yarn test:report

      #Publica o relatório do Mochawesome como artefato do workflow  
      - name: Salvando relatório Mochawesome como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-mochawesome
          path: mochawesome-report
  
        