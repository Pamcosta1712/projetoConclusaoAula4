
# CI de Nível 04 - Pipeline integrada de testes automatizados com Mocha e Mochawesome

# Nome exibido na aba Actions do GitHub
name: N4 - Execução Integrada

# Gatilhos de execução da pipeline
on:
  # Permite executar manualmente pela aba Actions do GitHub
  workflow_dispatch:

  # Executa automaticamente quando houver push na branch main ou master
  push:
    branches:
      - main
      - master

  # Executa automaticamente de forma agendada
  schedule:
    # Executa toda segunda-feira às 12h UTC
    - cron: "0 * * * *"

# Jobs da pipeline
jobs:
  testes-integrados:
    # Nome do job exibido na execução
    name: Executar testes e publicar relatório

    # Máquina virtual onde o job será executado
    runs-on: ubuntu-latest

    # Etapas executadas dentro do job
    steps:
      # Baixa o código do repositório para a máquina da pipeline
      - name: Clonando repositório
        uses: actions/checkout@v4

      # Configura o Node.js necessário para executar o projeto JavaScript
      - name: Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn

      # Instala o Yarn na máquina da pipeline
      - name: Instalando Yarn
        run: npm install -g yarn

      # Instala as dependências do projeto com base no package.json e yarn.lock
      - name: Instalando dependências
        run: yarn install --frozen-lockfile

      # Executa os testes automatizados com Mocha e gera o relatório com Mochawesome
      - name: Executando testes com Mocha e gerando relatório Mochawesome
        run: yarn test:report

      # Publica o relatório gerado como artefato da execução da pipeline
      - name: Publicando relatório Mochawesome como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-mochawesome-integrado
          path: mochawesome-report
          if-no-files-found: error

      # Exibe um resumo textual no log da pipeline
      - name: Resumo da execução integrada
        if: always()
        run: |
          echo "Pipeline integrada executada com GitHub Actions."
          echo "Gatilhos contemplados: push, execução manual e schedule."
          echo "Framework de testes utilizado: Mocha."
          echo "Relatório de testes utilizado: Mochawesome."
          echo "Relatório publicado como artefato: relatorio-mochawesome-integrado."
